<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่ออัจฉริยะ v3</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Tahoma', sans-serif; display: flex; flex-direction: column; align-items: center; background: #eef2f3; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        .video-box { position: relative; background: #000; border-radius: 15px; overflow: hidden; line-height: 0; }
        video { width: 100%; height: auto; }
        #status { margin: 15px 0; padding: 10px; border-radius: 10px; font-weight: bold; background: #fff3cd; color: #856404; }
        .reg-box { margin-top: 25px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; background: #ffffff; }
        input[type="text"] { width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-reg { background: #28a745; color: white; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚌 ระบบเช็คชื่อรถโรงเรียน</h2>
    <div id="status">กำลังเริ่มต้นระบบ...</div>

    <div class="video-box">
        <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="reg-box">
        <h3>➕ ลงทะเบียนเด็กใหม่</h3>
        <input type="text" id="newName" placeholder="ใส่ชื่อภาษาอังกฤษ (เช่น Somchai)">
        <br>
        <input type="file" id="filePicker" accept="image/*">
        <br>
        <button class="btn-reg" onclick="uploadNewStudent()">💾 บันทึกรูปและชื่อ</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    
    // *** สำคัญ: นำ URL Web App จาก Google Apps Script มาใส่ตรงนี้ ***
    const SCRIPT_URL = 'ใส่_URL_WEB_APP_ของคุณตรงนี้';

    async function init() {
        statusDiv.innerText = "⏳ กำลังโหลด AI...";
        try {
            // โหลดเฉพาะ Models ที่คุณมีในโฟลเดอร์ models
            await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('./models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('./models');

            // เปิดกล้อง
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;

            // ดึงข้อมูลเด็กจากฐานข้อมูล Google Drive
            statusDiv.innerText = "🔎 กำลังตรวจสอบฐานข้อมูลเด็ก...";
            const labeledFaceDescriptors = await loadFromDrive();
            
            if (labeledFaceDescriptors.length === 0) {
                statusDiv.style.background = "#d1ecf1";
                statusDiv.style.color = "#0c5460";
                statusDiv.innerText = "📢 ระบบว่างเปล่า กรุณาลงทะเบียนเด็กใหม่ด้านล่าง";
            } else {
                const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.55); // 0.55 คือค่าความเข้มงวด
                statusDiv.style.background = "#d4edda";
                statusDiv.style.color = "#155724";
                statusDiv.innerText = "✅ พร้อมสแกน! ระบบรู้จักเด็กทั้งหมด " + labeledFaceDescriptors.length + " คน";
                startScanning(faceMatcher);
            }
        } catch (err) {
            statusDiv.innerText = "❌ เกิดข้อผิดพลาด: " + err;
            console.error(err);
        }
    }

    async function loadFromDrive() {
        try {
            const response = await fetch(SCRIPT_URL);
            const students = await response.json();
            
            if (!students || students.length === 0) return [];

            return Promise.all(
                students.map(async (student) => {
                    const descriptions = [];
                    try {
                        const imgUrl = `https://drive.google.com/uc?export=view&id=${student.id}`;
                        const img = await faceapi.fetchImage(imgUrl);
                        const detections = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
                            .withFaceLandmarks().withFaceDescriptor();
                        if (detections) descriptions.push(detections.descriptor);
                    } catch (e) { console.error("โหลดรูปไม่ได้:", student.name); }
                    return new faceapi.LabeledFaceDescriptors(student.name, descriptions);
                })
            );
        } catch (e) {
            return [];
        }
    }

    function startScanning(faceMatcher) {
        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks().withFaceDescriptors();
            
            detections.forEach(async d => {
                const bestMatch = faceMatcher.findBestMatch(d.descriptor);
                // ถ้า AI มั่นใจเกิน 45% และไม่ใช่ unknown
                if (bestMatch.label !== 'unknown' && bestMatch.distance < 0.45) {
                    statusDiv.innerText = "🎯 พบ: " + bestMatch.label;
                    statusDiv.style.background = "#cce5ff";
                    
                    // บันทึกลง Sheet (ยิงไปเฉยๆ ไม่ต้องรอผล)
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ name: bestMatch.label, status: 'ขึ้นรถ' })
                    });
                }
            });
        }, 2000); // สแกนทุก 2 วินาที เพื่อไม่ให้เครื่องค้าง
    }

    async function uploadNewStudent() {
        const name = document.getElementById('newName').value.trim();
        const fileInput = document.getElementById('filePicker');
        if (!name || !fileInput.files[0]) return alert("กรุณาใส่ชื่อ (อังกฤษ) และเลือกรูปภาพ");

        statusDiv.innerText = "🚀 กำลังอัปโหลดข้อมูล...";
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64Data = e.target.result;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'register', name: name, image: base64Data })
                });
                alert("บันทึกเด็กใหม่เรียบร้อย! ระบบจะเริ่มต้นใหม่");
                location.reload();
            } catch (err) {
                alert("เกิดปัญหาในการส่งข้อมูล");
            }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    window.onload = init;
</script>
</body>
</html>
