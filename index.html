<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อรถโรงเรียน v2</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        video { width: 100%; border-radius: 10px; background: #000; }
        #status { margin: 15px 0; font-weight: bold; color: #1a73e8; }
        .reg-box { margin-top: 20px; padding: 20px; border: 2px dashed #ccc; border-radius: 10px; background: #fafafa; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #28a745; color: white; cursor: pointer; border: none; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚌 ระบบเช็คชื่อ & ลงทะเบียน</h2>
    <div id="status">กำลังเริ่มต้นระบบ...</div>

    <div style="position: relative; line-height: 0;">
        <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="reg-box">
        <h3>➕ ลงทะเบียนเด็กใหม่</h3>
        <input type="text" id="newName" placeholder="ชื่อเด็ก (ภาษาอังกฤษ)">
        <br>
        <input type="file" id="filePicker" accept="image/*">
        <br>
        <button onclick="uploadNewStudent()">💾 บันทึกรูปและชื่อ</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    
    // *** สำคัญ: ใส่ URL ของ Google Apps Script ของคุณที่นี่ ***
    const SCRIPT_URL = 'ใส่_URL_WEB_APP_ของ_APPS_SCRIPT_ตรงนี้';

    async function startApp() {
        statusDiv.innerText = "⏳ กำลังโหลดสมองกล AI...";
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri('./models'),
                faceapi.nets.faceLandmark68Net.loadFromUri('./models'),
                faceapi.nets.faceRecognitionNet.loadFromUri('./models')
            ]);

            statusDiv.innerText = "📷 กำลังเปิดกล้อง...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;

            statusDiv.innerText = "🔎 กำลังดึงรูปเด็กจาก Google Drive...";
            const labeledFaceDescriptors = await loadImagesFromDrive();
            
            if (labeledFaceDescriptors.length === 0) {
                statusDiv.innerText = "⚠️ ยังไม่มีข้อมูลเด็กในระบบ กรุณาลงทะเบียนด้านล่าง";
            } else {
                const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
                statusDiv.innerText = "✅ พร้อมสแกนหน้า!";
                startScanning(faceMatcher);
            }
        } catch (err) {
            statusDiv.innerText = "❌ เกิดข้อผิดพลาด: " + err;
        }
    }

    // ฟังก์ชันดึงรูปจาก Google Drive (ผ่าน doGet ใน Apps Script)
    async function loadImagesFromDrive() {
        const response = await fetch(SCRIPT_URL);
        const students = await response.json(); // จะได้ลิสต์ {name, id}
        
        return Promise.all(
            students.map(async (student) => {
                const descriptions = [];
                try {
                    // สร้าง URL รูปภาพตรงๆ จาก Google Drive ID
                    const imgUrl = `https://drive.google.com/uc?export=view&id=${student.id}`;
                    const img = await faceapi.fetchImage(imgUrl);
                    const detections = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks().withFaceDescriptor();
                    if (detections) descriptions.push(detections.descriptor);
                } catch (e) { console.error("โหลดรูปไม่สำเร็จ:", student.name); }
                return new faceapi.LabeledFaceDescriptors(student.name, descriptions);
            })
        );
    }

    function startScanning(faceMatcher) {
        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks().withFaceDescriptors();
            
            detections.forEach(async d => {
                const bestMatch = faceMatcher.findBestMatch(d.descriptor);
                if (bestMatch.label !== 'unknown') {
                    statusDiv.innerText = "🎯 พบ: " + bestMatch.label;
                    // ส่งข้อมูลเช็คชื่อไปที่ Sheet
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ name: bestMatch.label, status: 'ขึ้นรถ' })
                    });
                }
            });
        }, 1500);
    }

    // ฟังก์ชันส่งรูปไปบันทึกใน Drive
    async function uploadNewStudent() {
        const name = document.getElementById('newName').value;
        const fileInput = document.getElementById('filePicker');
        if (!name || !fileInput.files[0]) return alert("กรุณากรอกชื่อและเลือกรูป");

        statusDiv.innerText = "🚀 กำลังส่งรูปไปที่ Google Drive...";
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64Data = e.target.result;
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'register', name: name, image: base64Data })
            });
            alert("ลงทะเบียนน้อง " + name + " สำเร็จ! ระบบจะรีโหลด");
            location.reload();
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    window.onload = startApp;
</script>
</body>
</html>
